name: PR Fast Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_fast_checks: ${{ steps.resolve.outputs.run_fast_checks }}
    steps:
      - name: Mark workflow_dispatch as requiring fast checks
        id: manual
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "run_fast_checks=true" >> "$GITHUB_OUTPUT"

      - name: Detect files relevant to fast checks
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fast_checks:
              - 'R/**'
              - 'tests/**'
              - 'DESCRIPTION'
              - 'NAMESPACE'
              - 'man/**'
              - 'tools/ci/**'
              - 'renv.lock'
              - '.github/workflows/pr-fast-checks.yml'

      - name: Resolve fast-checks requirement
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_fast_checks=${{ steps.manual.outputs.run_fast_checks }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_fast_checks=${{ steps.filter.outputs.fast_checks }}" >> "$GITHUB_OUTPUT"
          fi

  fast-checks:
    needs: changes
    if: ${{ needs.changes.outputs.run_fast_checks == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v1

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat
          needs: check
          cache-version: 1
      - name: Build and install package
        run: |
          R CMD build .
          TARBALL=$(ls AdaptGMCP_*.tar.gz | head -1)
          R CMD INSTALL "$TARBALL"

      - name: Smoke check installed package exports
        run: |
          Rscript -e "library(AdaptGMCP); required <- c('simMAMSMEP','adaptGMCP_CER','adaptGMCP_PC','plotGraph','genPowerTablePlots','AdaptGMCPSimApp'); missing <- setdiff(required, getNamespaceExports('AdaptGMCP')); if (length(missing) > 0) stop(sprintf('Missing expected exports: %s', paste(missing, collapse = ', '))); cat('Smoke check passed. Package loaded and expected exports are available.\\n')"

      - name: Run fast test subset
        run: |
          Rscript tools/ci/run_fast_tests.R

  ci-gate:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - changes
      - fast-checks
    steps:
      - name: Enforce fast-checks result when required
        run: |
          echo "run_fast_checks: ${{ needs.changes.outputs.run_fast_checks }}"
          echo "fast-checks result: ${{ needs['fast-checks'].result }}"
          if [ "${{ needs.changes.outputs.run_fast_checks }}" != "true" ]; then
            echo "No relevant changes detected; skipping fast-checks requirement."
            exit 0
          fi
          test "${{ needs['fast-checks'].result }}" = "success"
